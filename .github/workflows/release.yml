name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'

jobs:
  # ── 1. Go server binaries (cross-compile, all platforms) ─────────────
  server-binaries:
    name: Server Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Copy frontend dist into backend/static
        run: |
          rm -rf backend/static/assets backend/static/index.html
          cp -r frontend/dist/* backend/static/

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build all release binaries
        run: make release VERSION=${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: server-binaries
          path: dist/

  # ── 2. Desktop – macOS Universal DMG ─────────────────────────────────
  desktop-macos:
    name: Desktop (macOS Universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Build Go sidecar binaries (macOS amd64 + arm64)
        run: make tauri-sidecar VERSION=${{ github.ref_name }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build universal macOS DMG
        working-directory: frontend
        run: npm run tauri:build:mac:universal:dmg
        env:
          VERSION: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # ── 3. Desktop – Linux (.deb + .AppImage) ────────────────────────────
  desktop-linux:
    name: Desktop (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Build Go sidecar (Linux amd64)
        run: |
          mkdir -p frontend/src-tauri/binaries
          cd backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X skylark-router/version.Version=${{ github.ref_name }}" \
            -o ../frontend/src-tauri/binaries/skylark-router-x86_64-unknown-linux-gnu .

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Linux bundle
        working-directory: frontend
        run: npx tauri build --bundles deb,appimage
        env:
          VERSION: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage

  # ── 4. Desktop – Windows (.msi + NSIS installer) ─────────────────────
  desktop-windows:
    name: Desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Build Go sidecar (Windows amd64)
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          cd backend
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X skylark-router/version.Version=${{ github.ref_name }}" \
            -o ../frontend/src-tauri/binaries/skylark-router-x86_64-pc-windows-msvc.exe .

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows bundle
        working-directory: frontend
        run: npx tauri build --bundles msi,nsis
        env:
          VERSION: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe

  # ── 5. Docker multi-arch image → ghcr.io ─────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  # ── 6. Create GitHub Release with all artifacts ───────────────────────
  create-release:
    name: Create Release
    needs:
      - server-binaries
      - desktop-macos
      - desktop-linux
      - desktop-windows
      - docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display collected artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/server-binaries/skylark-router-darwin-amd64
            artifacts/server-binaries/skylark-router-darwin-arm64
            artifacts/server-binaries/skylark-router-linux-amd64
            artifacts/server-binaries/skylark-router-linux-arm64
            artifacts/server-binaries/skylark-router-windows-amd64.exe
            artifacts/server-binaries/skylark-router-windows-arm64.exe
            artifacts/desktop-macos/*.dmg
            artifacts/desktop-linux/*.deb
            artifacts/desktop-linux/*.AppImage
            artifacts/desktop-windows/*.msi
            artifacts/desktop-windows/*.exe
